name: deep-planning
version: 1
description: >
  Deep-planning workflow - thinking-record driven. openspec-explore reasons about the
  WHAT (exploration note); openspec-design reasons about the HOW and writes design.md
  directly - including the wave skeleton (value-ordered vertical slices) - plus ADRs.
  The generic writer (e.g. openspec-continue-change) transcribes proposal -> specs from the
  exploration note, gates on design.md (authored by openspec-design), then mechanically
  transcribes design.md's wave skeleton into the tasks.md TDD wave map for autonomous,
  harness-driven execution.

# Draft consecutive mechanical artifacts (proposal -> specs) in one openspec-continue-change,
# stopping at the design gate (which needs a openspec-design thinking note first).
continueMode: flow-to-gate

artifacts:
  - id: proposal
    generates: proposal.md
    description: Initial proposal document outlining the change
    template: proposal.md
    instruction: |
      Create the proposal document that establishes WHY this change is needed.

      INCORPORATE THE EXPLORATION NOTE (if present): before writing, look for an
      exploration note at `openspec/explorations/<change-name>.md` (written by
      openspec-explore). If it exists, it is your PRIMARY input - the WHAT is already
      crystallized. Transcribe it, don't re-derive it:
      - Problem / Why -> the Why section
      - Scope & Non-Goals -> What Changes
      - Constraints -> the Constraints section
      - Capabilities (new vs modified) -> the Capabilities section
      Carry any "Parked Design Seeds" forward untouched - they are for the design phase.

      Sections:
      - **Why**: 1-2 sentences on the problem or opportunity. What problem does this solve? Why now?
      - **What Changes**: Bullet list of changes. Be specific about new capabilities, modifications, or removals. Mark breaking changes with **BREAKING**.
      - **Capabilities**: Identify which specs will be created or modified:
        - **New Capabilities**: List capabilities being introduced. Each becomes a new `specs/<name>/spec.md`. Use kebab-case names.
        - **Modified Capabilities**: List existing capabilities whose REQUIREMENTS are changing. Check `openspec/specs/` for existing spec names. Leave empty if no requirement changes.
      - **Constraints**: The given limits the solution must respect, grouped (Compatibility / Performance / Security & Compliance / Operational) and each falsifiable — a number or named rule, not an adjective ("p95 < 200ms at 1k RPS", not "fast"). Write `None` for a group that genuinely has none; send unknowns to the design's open questions rather than guessing. These are *given* constraints (handed to you by the world) — distinct from ADRs, which record constraints the team *decided*.
      - **Impact**: Affected code, APIs, dependencies, or systems.

      Keep it concise (1-2 pages). Focus on the "why" not the "how" -
      implementation details belong in design.md.
    requires: []

  - id: specs
    generates: "specs/**/*.md"
    description: Detailed specifications for the change (the WHAT)
    template: spec.md
    instruction: |
      Create specification files that define WHAT the system should do.

      INCORPORATE THE EXPLORATION NOTE (if present): if `openspec/explorations/<change-name>.md`
      exists, its Capabilities and scope are the source for the requirements here.

      Create one spec file per capability listed in the proposal's Capabilities section.
      - New capabilities: use the exact kebab-case name from the proposal (specs/<capability>/spec.md).
      - Modified capabilities: use the existing spec folder name when creating the delta spec.

      Delta operations (use ## headers):
      - **ADDED Requirements**, **MODIFIED Requirements** (include full updated content),
        **REMOVED Requirements** (include **Reason** and **Migration**), **RENAMED Requirements** (FROM:/TO:).

      Format requirements:
      - Each requirement: `### Requirement: <name>` followed by description.
      - Use SHALL/MUST for normative requirements (avoid should/may).
      - Each scenario: `#### Scenario: <name>` with WHEN/THEN format.
      - **CRITICAL**: Scenarios MUST use exactly 4 hashtags (`####`).
      - Every requirement MUST have at least one scenario.
      - **Falsifiable only**: every requirement and scenario must be checkable. Ban vibe words - "fast", "robust", "scalable", "performant", "user-friendly", "as needed" - and replace each with a measurement or named rule ("p95 < 200ms at 1k RPS", not "fast"). If a criterion can't be made falsifiable, the requirement is too vague - sharpen it before writing the scenario.

      Specs should be testable - each scenario is a potential test case.
    requires:
      - proposal

  - id: design
    generates: design.md
    description: Technical design + wave skeleton (the HOW), authored directly by openspec-design
    template: design.md
    instruction: |
      GATE - design.md is authored by the interactive HOW thinker (openspec-design), NOT by this
      generic writer.

      The deep HOW thinking - approaches, decomposition, the load-bearing decisions, the ADRs,
      AND the **wave skeleton** (the value-ordered vertical slices the autonomous harness runs) -
      happens in openspec-design, which interviews the user, gates them on the wave-map shape, and
      writes design.md directly into this change's directory. design.md is the single source of
      the HOW contract; only openspec-design authors it.

      You are only ever reading this instruction because design.md does NOT exist yet - once it
      exists this artifact is already complete (status is file-presence based) and this step is
      skipped. So: **STOP. Do not write, transcribe, summarize, or stub a mechanical design.md
      from the proposal/specs.** Tell the user exactly this:
        "No design found. Run openspec-design <change> first to think through the HOW - approaches,
        decomposition, ADRs, and the wave skeleton - with you, and write design.md. Then re-run
        continue to transcribe the wave map into tasks.md."

      (The completeness of design.md - every scenario has a test layer, every wave has an
      acceptance command, no decision dodged into Open Questions - is enforced by openspec-design's
      own self-review and re-checked by the mechanical `tasks` transcription, which STOPs on a
      design gap. It is not this step's job: this step never runs once design.md is present.)
    requires:
      - proposal
      - specs

  - id: tasks
    generates: tasks.md
    description: The TDD wave map - value-ordered vertical slices the harness executes autonomously
    template: tasks.md
    instruction: |
      Create the **wave map** (`tasks.md`): the change-level work queue the autonomous harness
      executes. This is a **mechanical transcription** of design.md's **Wave Skeleton / Build
      Sequence** section into the tasks.md format, plus the one legitimately repo-coupled job:
      grounding the named-test paths against the actual repo layout. You author no judgment.

      MECHANICAL ONLY - tasks makes NO design decisions. design.md has already settled
      everything: the waves, their value ordering, the wave-0 tracer, the component->wave mapping,
      the dependencies, the acceptance commands, AND the test layer for each scenario (design's
      Testing Approach). You TRANSCRIBE; you do not re-slice, re-order, or re-decide. If you find a
      decision is missing - an unsettled choice, a deferred "?", a wave with no acceptance command,
      OR a spec scenario whose test layer the design did not settle - STOP: that is a design gap.
      Do not fill it here; send the user back to openspec-design to settle it, then resume.

      **Triage design's Open Questions before building anything.** Read design.md's
      "Open Questions" section and classify EVERY item - the section conflates three cases
      with different consequences:
      - **A dodged HOW decision** (design should have settled it - a reasonable engineer could
        implement it two materially different user-visible ways) -> STOP. Design gap; send the
        user back to openspec-design. Never paper over it by picking one here.
      - **A genuine in-scope unknown** (needs the user or external information to resolve, and a
        wave in THIS change depends on it) -> STOP. An autonomous run cannot obtain that
        information, so it must be settled before the wave map is approved. Surface it to the
        user now.
      - **Genuinely out of scope / a non-goal** (no wave depends on it) -> safe to carry, but
        never silently. Echo these items verbatim under a `## Carried-over Open Questions`
        heading at the TOP of tasks.md (before the coverage map), as plain `-` bullets with NO
        checkboxes, so the human approving the wave map SEES them instead of having them buried
        in design.md.
      If the Open Questions section is empty (the expected state after a complete design),
      write nothing extra. Mechanical wiring (config, glue, imports) is NOT an open question -
      it is just a standard step with a verify command.

      **What was already decided in design (do NOT re-derive it here).** design.md's Wave Skeleton
      settled the wave model for you: each wave is a value-delivering vertical slice (not a
      horizontal layer); waves are value-ordered respecting dependencies; wave 0 is the tracer
      bullet (committed RED); behavior is proven test-first; breaking reshapes of existing APIs are
      sliced atomically with their caller+test migrations; and no scenario was scope-reduced. Your
      job is to TRANSCRIBE that skeleton faithfully - if any of these properties is missing from
      design.md (e.g. a tests-last ordering, an un-sliced breaking change, a "v1 / MVP / for now"
      trim), that is a **design gap -> STOP** and send the user back to openspec-design. Never repair
      it by re-slicing here.

      **Transcribe the Wave Skeleton into the template.** Each `## Wave N` block maps 1:1 from the
      matching wave in design.md's Wave Skeleton:
      - `- [ ]` value goal, `components:`, `depends-on:`, `acceptance:`, `stamps:`, `skills:` <-
        copied straight from that wave's Wave Skeleton entry.
      - `interfaces:` <- a mechanical lookup: each component in `components:` has an interface in
        design.md's Components & Dependencies table; copy it. (Interfaces are not re-listed in the
        Wave Skeleton, so this is the one cross-reference, not a decision.)
      - The coverage map table <- a join: design.md's Testing Approach gives Scenario -> Layer; the
        Wave Skeleton's "proves scenarios" gives Scenario -> Wave. TRANSCRIBE the Layer; never
        choose it. The Named test column is the ONLY new content you author.

      **IMPORTANT: Follow the template format exactly** (the parser counts checkboxes as
      progress units, so checkboxes appear at WAVE grain ONLY):
      - One `## Wave N` heading per wave (`## Wave 0` first).
      - **Exactly one `- [ ]` checkbox per wave**, the first line under the heading, stating the
        wave's observable-value goal. This is the only progress tick (it means "wave gate
        passed"). Per-cycle ticks live in the JIT wave plan, never here.
      - All other per-wave detail uses plain `-` bullets (NO checkboxes): `components:`,
        `interfaces:`, `depends-on:`, `acceptance:` (the command(s) that prove the wave),
        `stamps:` (inline backtick tags `size:S|M|L`, `risk:low|med|high`, and optional tier
        hints `plannerTier:` / `implTier:` - planner tier always >= implementer tier),
        `skills:` (SKILL.md paths relevant to this wave, including the project test-strategy
        skill when tests are involved).
      - A single **coverage map table** (top of file, after a one-line intro): columns
        `| Scenario | Layer | Named test | Wave |`. TRANSCRIBE the Layer column from design's
        Testing Approach - do not choose layers here. The Named test column (a concrete test
        name/path you are introducing) is the only new content. No checkboxes in the table.
      - **Ground every named-test path against the repo.** Before writing a test path, confirm it
        matches the project's actual convention for that layer - grep an EXISTING test of the same
        layer and mirror its directory/suffix (e.g. e2e specs may live under `playwright/tests/`,
        not `playwright/`). Never invent a path the repo's layout doesn't support, and never name
        an existing file that does not exist.

      Reference specs for what each wave must prove and design.md's Wave Skeleton for the slices.
    requires:
      - specs
      - design

apply:
  requires: [tasks]
  tracks: tasks.md
  instruction: |
    Read the context files and tasks.md (the wave map). Work through the waves in order;
    within each wave run red-green-refactor cycles test-first, committing per cycle
    (`test:` then `feat:`/`refactor:`). Tick a wave's checkbox only when its wave gate
    passes. For autonomous execution, the JIT plan for a wave comes from
    `openspec instructions wave-plan --change <name> --wave <N>`.
    Pause if you hit blockers or need clarification.

# Served by `openspec instructions wave-plan --change <X> --wave <N>`. Generates the
# just-in-time executable plan for one wave, written to plans/wave-<N>.md. The harness
# calls this once per wave at run time; humans do NOT pre-approve wave plans in v1.
wavePlan:
  requires: [tasks]
  instruction: |
    You are the just-in-time **wave planner**. Turn the `## Wave N` block of the change's
    wave map (tasks.md) into a self-sufficient, executable plan that a fresh-context agent
    can implement WITHOUT prior knowledge of this codebase. Write it to plans/wave-<N>.md.

    SELF-SUFFICIENCY STANDARD (the bar): could an agent unfamiliar with this codebase
    implement this wave using ONLY your plan plus the files it tells them to read? If not,
    the plan is incomplete. No prior-knowledge assumptions.

    The plan MUST contain:
    - **Mandatory Reading** - a table of files to read BEFORE coding: P0/P1/P2, each with
      line ranges and WHY ("pattern to MIRROR", "types to IMPORT", "tests to EXTEND").
      Include the skill paths from the wave's `skills:` refs, and - whenever the wave writes
      tests - the project **test-strategy** skill (its scenario-class -> layer table, mock
      allowlist, and enforced bans are load-bearing). Read it; do not restate the table.
    - **Patterns to Mirror** - actual copy-pasted code snippets, each tagged `SOURCE: file:lines`.
      Snippets, not descriptions. Re-verify them against the live code as you implement; if a
      pattern has drifted, adapt and note it.
    - **Files to Change** - CREATE / UPDATE / DELETE with a one-line justification each; every
      path must already exist (or its parent dir, for CREATE).
    - **Cycles** - the wave's red-green-refactor cycles, pre-ordered. ONE checkbox per cycle.
      Each cycle carries: the **behavior** it proves (from a spec scenario), its **test layer**
      (transcribed from the wave map's coverage map - do NOT re-decide it), **Mirror** (file:line),
      **Gotcha**, and a **Validate** command (the exact command that proves this cycle, e.g. the
      single scoped test). Commit grain is per cycle: `test:` (RED) then `feat:`/`refactor:` (GREEN).

    HARD RULES:
    - **Plan only, never implement**: you read and write plans/wave-<N>.md. Do NOT write, edit,
      or run source/test files or commands (no probes, no test runs, no library spelunking).
      Library/jsdom/tooling fragility is the implementer's job - capture it as a Gotcha, never
      solve it here. Running code is how the planner blows its turn budget.
    - **Nyquist self-check**: every cycle has an automated way to verify it (a Validate command).
      A cycle with no automated verification is a planning defect - fix it (add the scaffold, or
      flag the wave-0 scaffold gap) before saving the plan.
    - **No scope reduction**: never shrink a scenario with "v1 / for now / simplified / MVP /
      just". The wave map is the contract; plan the whole behavior.
    - **No placeholders**: no "TODO", "implement later", "..." stubs, or invented APIs. Every
      referenced symbol/file/command must be real and verified.
    - **A behavior change includes its test**: if a cycle reshapes a shared API or migrates a
      caller, the SAME cycle updates that caller's existing tests to the new shape. Never leave a
      test asserting the old shape - it red-fails the gate.
    - **Bounded discretion**: you TRANSCRIBE design + specs into cycles. Design decisions stay
      settled upstream - you do not re-open them. You MAY split this wave into ordered cycles and,
      if the wave map genuinely under- or over-counted, append/split a wave (planner authority) -
      but never invent scope the design did not call for.
    - **Plan scope = cycles only**: the plan's checkboxes are THIS wave's red-green-refactor
      cycles. The plan MUST NOT add any step that edits tasks.md or ticks the wave-map checkbox -
      that wave-level tick is the orchestrator's job (the harness wave gate, or the human working
      the wave map), never the per-wave implementer's.
    - **Documented-deviation rule**: v1 runs with no mid-run human gate. If you hit a design fork
      the upstream design did NOT settle, do not silently pick and bury it. Record the decision +
      rationale as a **documented deviation** in progress.md and the final report. End-of-run
      review treats documented deviations as intentional and flags only undocumented ones - that
      is what keeps the no-interruption contract honest. When genuinely blocked (mechanically
      stuck, or a fork too consequential to log-and-continue), stop and surface it.
